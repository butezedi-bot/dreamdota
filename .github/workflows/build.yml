name: Build DreamDota Pro
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install v140 Build Tools
      run: |
        $vsInstaller = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
        & $vsInstaller modify --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" --add Microsoft.VisualStudio.Component.VC.140 --quiet --norestart --force
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore DreamWarcraft.sln

    - name: Build DreamDota (Release)
      run: msbuild DreamWarcraft.sln /p:Configuration="Public Release DreamDota" /p:Platform=Win32 /m

    - name: Upload DreamWarcraft.dll
      uses: actions/upload-artifact@v4
      with:
        name: DreamDota-Pro-DLL
        path: |
          **/DreamWarcraft.dll
          **/Dream.mix
        retention-days: 30

    - name: Create Release Info
      run: |
        echo "DreamDota Pro Edition" > release-info.txt
        echo "Build Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> release-info.txt
        echo "- Pro Auto Attack" >> release-info.txt
        echo "- Perfect Last Hit" >> release-info.txt
        echo "- Always Crit" >> release-info.txt
        echo "- Super Power" >> release-info.txt
        echo "- Speed Hack" >> release-info.txt
        echo "- Vision Hack" >> release-info.txt
      shell: pwsh

    - name: Upload Release Info
      uses: actions/upload-artifact@v4
      with:
        name: Release-Info
        path: release-info.txt
